kind = "web"
previewPath = "/"
title = "Quran Companion"
version = "1.0.0"
id = "artifacts/quran-companion"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24664

[services.development]
run = "pnpm --filter @workspace/quran-companion run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/quran-companion", "run", "build" ]
publicDir = "artifacts/quran-companion/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24664"
BASE_PATH = "/"
